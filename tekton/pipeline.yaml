apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  params:
    - name: repo-url
      type: string
    - name: branch
      type: string
      default: "main"
    - name: build-image
      type: string
  workspaces:
    - name: pipeline-workspace
  tasks:
    - name: clone
      taskRef:
        name: git-clone
      params:
      - name: url
        value: $(params.repo-url)
      - name: revision
        value: $(params.branch)
      workspaces:
      - name: output
        workspace: pipeline-workspace

    - name: lint
      taskRef:
        name: flake8
      runAfter:
        - clone
      params:
      - name: image
        value: "python:3.9-slim"
      - name: args
        value: ["--count", "--max-complexity=10", "--max-line-length=127", "--statistics"]
      workspaces:
      - name: source
        workspace: pipeline-workspace

    - name: tests
      taskRef:
        name: nose
      runAfter:
        - clone
      params:
      - name: database_uri
        value: "sqlite:///test.db"
      - name: args
        value: "-v --with-spec --spec-color"
      workspaces:
      - name: source
        workspace: pipeline-workspace

    - name: build
      taskRef:
        name: buildah
        kind: ClusterTask
      runAfter:
        - lint
        - tests
      params:
      - name: IMAGE
        value: "$(params.build-image)"
      workspaces:
      - name: source
        workspace: pipeline-workspace